name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: v
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Managed UPS Card ${{ steps.v.outputs.VERSION }}"
          body: |
            ## Managed UPS Card ${{ steps.v.outputs.VERSION }}

            ### Installazione via HACS
            Aggiorna direttamente da HACS → Frontend.

            ### Installazione manuale
            Scarica `managed-ups-card.js` e copialo in `config/www/`, poi aggiungilo
            come risorsa Lovelace (`/local/managed-ups-card.js`).

            Vedi il [README](https://github.com/${{ github.repository }}#readme).
          files: |
            managed-ups-card.js
